services:
  app:
    build:
      context: ./docker/php
      args:
        user: pedro
        uid: 1000
    container_name: cash-flow-api
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - cashflow
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:alpine
    container_name: cash-flow-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - cashflow
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: cash-flow-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cash_flow
      MYSQL_USER: cashflow
      MYSQL_PASSWORD: cashflow
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cashflow
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cash-flow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cashflow

networks:
  cashflow:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
